<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopX - E-Commerce</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand">ShopX</a>

  <!-- Search -->
  <form class="d-flex w-50 mx-3">
    <input class="form-control" id="searchBox" type="search" placeholder="Search products..." onkeyup="searchProduct()">
  </form>

  <div>
    <span class="text-white me-3" id="user-name"></span>
    <button class="btn btn-warning me-2" onclick="viewCart()">
      Cart (<span id="cart-count">0</span>)
    </button>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<!--  Hero Banner -->
<div class="hero text-center text-white d-flex align-items-center">
  <div class="container">
    <img src="images/sale.jpg" alt="Big Fashion Sale" class="img-fluid" style="max-width: 400px; height: auto;">
  </div>
</div>

<!--  Categories -->
<div class="container mt-4">
  <h3>Categories</h3>
  <div class="row text-center">
    <div class="col">👕 Men</div>
    <div class="col">👗 Women</div>
    <div class="col">👟 Shoes</div>
    <div class="col">⌚ Accessories</div>
  </div>
</div>

<!--  Products -->
<div class="container mt-4">
  <h3>Products</h3>
  <div class="row" id="product-list"></div>
</div>

<!--  Cart Modal -->
<div class="modal fade" id="cartModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Your Cart</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="cart-items"></div>

      <div class="modal-footer">
        <h5>Total: ₹<span id="total-price">0</span></h5>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
